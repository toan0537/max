name: MAX Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "max-pages"
  cancel-in-progress: false

jobs:
  max-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload MAX artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy MAX site
        id: deployment
        uses: actions/deploy-pages@v4
